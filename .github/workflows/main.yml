name: Multi-Environment Deployments

on:
  push:
    branches:
      - main

jobs:
  deploy_dev:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Fake deploy to DEV
        run: echo "Deploying to DEV..."

      - name: Notify Jira (DEV)
        run: |
          curl -X POST \
            -H "Authorization: Basic $(echo -n ${{ secrets.JIRA_EMAIL }}:${{ secrets.JIRA_API_TOKEN }} | base64)" \
            -H "Content-Type: application/json" \
            --data '{
              "deployments": [
                {
                  "schemaVersion": "1.0",
                  "deploymentSequenceNumber": 1,
                  "updateSequenceNumber": 1,
                  "displayName": "DEV Deployment",
                  "url": "https://github.com/${{ github.repository }}/actions",
                  "state": "successful",
                  "environment": {
                    "id": "dev",
                    "displayName": "Development",
                    "type": "development"
                  },
                  "associations": [
                    {
                      "associationType": "issueIdOrKeys",
                      "values": ["SCRUM-43"]
                    }
                  ]
                }
              ]
            }' \
            "${{ secrets.JIRA_SITE }}/rest/deployments/0.1/bulk"

  deploy_staging:
    runs-on: ubuntu-latest
    needs: deploy_dev
    steps:
      - uses: actions/checkout@v3

      - name: Fake deploy to STAGING
        run: echo "Deploying to STAGING..."

      - name: Notify Jira (STAGING)
        run: |
          curl -X POST \
            -H "Authorization: Basic $(echo -n ${{ secrets.JIRA_EMAIL }}:${{ secrets.JIRA_API_TOKEN }} | base64)" \
            -H "Content-Type: application/json" \
            --data '{
              "deployments": [
                {
                  "schemaVersion": "1.0",
                  "deploymentSequenceNumber": 2,
                  "updateSequenceNumber": 2,
                  "displayName": "STAGING Deployment",
                  "url": "https://github.com/${{ github.repository }}/actions",
                  "state": "successful",
                  "environment": {
                    "id": "staging",
                    "displayName": "Staging",
                    "type": "staging"
                  },
                  "associations": [
                    {
                      "associationType": "issueIdOrKeys",
                      "values": ["SCRUM-43"]
                    }
                  ]
                }
              ]
            }' \
            "${{ secrets.JIRA_SITE }}/rest/deployments/0.1/bulk"

  deploy_prod:
    runs-on: ubuntu-latest
    needs: deploy_staging
    steps:
      - uses: actions/checkout@v3

      - name: Fake deploy to PROD
        run: echo "Deploying to PROD..."

      - name: Notify Jira (PROD)
        run: |
          curl -X POST \
            -H "Authorization: Basic $(echo -n ${{ secrets.JIRA_EMAIL }}:${{ secrets.JIRA_API_TOKEN }} | base64)" \
            -H "Content-Type: application/json" \
            --data '{
              "deployments": [
                {
                  "schemaVersion": "1.0",
                  "deploymentSequenceNumber": 3,
                  "updateSequenceNumber": 3,
                  "displayName": "PROD Deployment",
                  "url": "https://github.com/${{ github.repository }}/actions",
                  "state": "successful",
                  "environment": {
                    "id": "prod",
                    "displayName": "Production",
                    "type": "production"
                  },
                  "associations": [
                    {
                      "associationType": "issueIdOrKeys",
                      "values": ["SCRUM-43"]
                    }
                  ]
                }
              ]
            }' \
            "${{ secrets.JIRA_SITE }}/rest/deployments/0.1/bulk"
